        code: "def _s(x):\n    if x is None:\n        return \"\"\n    if isinstance(x, str):\n        return x.strip()\n    if isinstance(x, bool):\n        return \"\"\n    if isinstance(x, (int, float)):\n        return str(x).strip()\n    if isinstance(x, dict):\n        for k in (\"text\", \"content\", \"body\", \"value\", \"input\"):\n            v = x.get(k)\n            if v is not None and str(v).strip():\n                return _s(v)\n        return \"\"\n    if isinstance(x, list):\n        return \" \".join(_s(i) for i in x).strip()\n    return str(x).strip()\n\n\ndef main(word, user_context, locale, direction):\n    pw = _s(word)\n    pc = _s(user_context)\n    pl = _s(locale)\n    pd = _s(direction)\n    user_block_zh = (\n        \"【目标词条】\" + pw + \"\\n\"\n        \"请仅为上述【目标词条】撰写现代汉语词典 JSON；释义、例句、辨析必须全部围绕该词，不得写其它词。\\n\"\n        \"word: \" + pw + \"\\n\"\n        \"user_context: \" + pc + \"\\n\"\n        \"locale: \" + pl + \"\\n\"\n    )\n    user_block_en = (\n        \"【HEADWORD】\" + pw + \"\\n\"\n        \"Produce English business dictionary JSON for this headword only.\\n\"\n        \"word: \" + pw + \"\\n\"\n        \"user_context: \" + pc + \"\\n\"\n        \"locale: \" + pl + \"\\n\"\n    )\n    user_block_enzh = (\n        \"【目标词条】\" + pw + \"\\n\"\n        \"direction: \" + pd + \"\\n\"\n        \"user_context: \" + pc + \"\\n\"\n        \"locale: \" + pl + \"\\n\"\n    )\n    return {\n        \"p_word\": pw,\n        \"p_ctx\": pc,\n        \"p_locale\": pl,\n        \"p_dir\": pd,\n        \"user_block_zh\": user_block_zh,\n        \"user_block_en\": user_block_en,\n        \"user_block_enzh\": user_block_enzh,\n    }\n"
        code_language: python3
        desc: 用 _s() 转字符串；输出 p_word 等供「封装 API JSON」绑定。LLM 侧已改为引用「开始」节点 word，避免 IF 后 {{#c0300000...#}} 不替换。
