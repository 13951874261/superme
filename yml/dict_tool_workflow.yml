        code: "import json\n\n_FENCE = chr(96) * 3\n_ALLOWED = frozenset({\"zh_modern\"\
          , \"en_en_business\", \"en_zh_bidirectional\"})\n\n\ndef _pick_raw_by_type(dict_type:\
          \ str, raw_zh: str, raw_en: str, raw_enzh: str) -> str:\n    t = (dict_type\
          \ or \"\").strip()\n    if t == \"zh_modern\":\n        return (raw_zh or\
          \ \"\").strip()\n    if t == \"en_en_business\":\n        return (raw_en\
          \ or \"\").strip()\n    return (raw_enzh or \"\").strip()\n\n\ndef main(raw_zh:\
          \ str, raw_en: str, raw_enzh: str, word: str, route_type: str) -> dict:\n\
          \    def fail(code: str, msg: str) -> dict:\n        err = {\n         \
          \   \"ok\": False,\n            \"error_code\": code,\n            \"message\"\
          : msg,\n            \"word\": word or \"\",\n            \"type\": (route_type\
          \ or \"\").strip(),\n        }\n        return {\"result_json\": json.dumps(err,\
          \ ensure_ascii=False)}\n\n    dt = (route_type or \"\").strip()\n    if\
          \ dt not in _ALLOWED:\n        return fail(\"INPUT\", \"type 必须是 zh_modern\
          \ | en_en_business | en_zh_bidirectional\")\n    t = _pick_raw_by_type(dt,\
          \ raw_zh, raw_en, raw_enzh)\n    if t.startswith(_FENCE):\n        lines\
          \ = t.split(\"\\n\")\n        if lines and lines[0].startswith(_FENCE):\n\
          \            lines = lines[1:]\n        if lines and lines[-1].strip() ==\
          \ _FENCE:\n            lines = lines[:-1]\n        t = \"\\n\".join(lines).strip()\n\
          \    if not t:\n        return fail(\"PARSE\", \"LLM 输出为空（请确认当前分支 LLM 已执行且三路汇入本节点）\"\
          )\n    try:\n        payload = json.loads(t)\n    except Exception as e:\n\
          \        return fail(\"PARSE\", \"LLM 输出非合法 JSON: \" + str(e))\n    if not\
          \ isinstance(payload, dict):\n        return fail(\"PARSE\", \"根节点必须是 JSON\
          \ 对象\")\n    out = {\"ok\": True, \"type\": dt, \"payload\": payload}\n\
          \    return {\"result_json\": json.dumps(out, ensure_ascii=False)}\n"
