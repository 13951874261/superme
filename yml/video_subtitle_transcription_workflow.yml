  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .mp3
      - .wav
      - .m4a
      allowed_file_types:
      - audio
      allowed_file_upload_methods:
      - local_file
      enabled: true
      fileUploadConfig:
        audio_file_size_limit: 150
        batch_count_limit: 1
        file_size_limit: 150
        file_upload_limit: 1
        workflow_file_upload_limit: 1
