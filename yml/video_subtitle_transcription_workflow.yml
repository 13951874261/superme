app:
  description: 视频与音频字幕提取工作流。接收 MP3 音频文件，调用内置 ASR 进行语音转写，通过 LLM 整理为 Markdown 规范文本并配合听辨生成标准的带有时间轴的 SRT 字幕文件。
  icon: 📹
  icon_background: '#FFEFEA'
  icon_type: emoji
  mode: workflow
  name: video_subtitle_transcription_workflow
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.6.0
