          \  \"user_context: \" + pc + \"\\n\"\n        \"locale: \" + pl + \"\\n\"\
          \n    )\n    return {\n        \"p_word\": pw,\n        \"p_ctx\": pc,\n\
          \        \"p_locale\": pl,\n        \"p_dir\": pd,\n        \"user_block_zh\"\
