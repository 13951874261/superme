          \ + \"\\n\"\n        \"locale: \" + pl + \"\\n\"\n    )\n    user_block_en\
          \ = (\n        \"【HEADWORD】\" + pw + \"\\n\"\n        \"Produce English\
          \ business dictionary JSON for this headword only.\\n\"\n        \"word:\
