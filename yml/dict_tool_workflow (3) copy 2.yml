    - data:
        code: "import json\n\n_ALLOWED = {\"zh_modern\", \"en_en_business\", \"en_zh_bidirectional\"\
          }\n\n# 每个 dict_type 的必须键清单\n_REQUIRED_KEYS = {\n    \"zh_modern\": [\"pos\"\
          , \"definition\", \"phonetic\", \"usage_notes\", \"other_meanings\",\n \
          \                 \"example_sentences\", \"collocations\", \"synonyms\"\
          , \"antonyms\", \"confusable_pairs\"],\n    \"en_en_business\": [\"headword\"\
          , \"pos\", \"phonetic\", \"definitions_en\", \"business_notes\",\n     \
          \                  \"scenarios\", \"other_meanings\", \"example_sentences\"\
          , \"synonyms\", \"antonyms\", \"collocations\"],\n    \"en_zh_bidirectional\"\
          : [\"direction_resolved\", \"phonetic\", \"pos\", \"translation_main\",\n\
          \                            \"other_meanings\", \"business_examples\",\
          \ \"example_sentences\",\n                            \"synonyms\", \"antonyms\"\
          , \"collocations\"],\n}\n\ndef _pick_raw_by_type(dt, raw_zh, raw_en, raw_enzh):\n\
          \    if dt == \"zh_modern\":\n        return (raw_zh or \"\").strip()\n\
          \    if dt == \"en_en_business\":\n        return (raw_en or \"\").strip()\n\
          \    return (raw_enzh or \"\").strip()\n\ndef main(raw_zh: str, raw_en:\
          \ str, raw_enzh: str, word: str, route_type: str) -> dict:\n    def fail(code:\
          \ str, msg: str) -> dict:\n        err = {\n            \"ok\": False,\n\
          \            \"error_code\": code,\n            \"message\": msg,\n    \
          \        \"word\": word or \"\",\n            \"type\": (route_type or \"\
          \").strip(),\n        }\n        return {\"result_json\": json.dumps(err,\
          \ ensure_ascii=False)}\n\n    dt = (route_type or \"\").strip()\n    if\
          \ dt not in _ALLOWED:\n        return fail(\"INPUT\", \"type 必须是 zh_modern\
          \ | en_en_business | en_zh_bidirectional\")\n\n    t = _pick_raw_by_type(dt,\
          \ raw_zh, raw_en, raw_enzh)\n\n    def extract_json_str(s: str) -> str:\n\
          \        s = s.strip()\n        first_fence = s.find(\"```\")\n        if\
          \ first_fence != -1:\n            start_idx = s.find(\"\\n\", first_fence)\n\
          \            if start_idx == -1:\n                start_idx = first_fence\
          \ + 3\n            else:\n                start_idx += 1\n            last_fence\
          \ = s.rfind(\"```\")\n            if last_fence != -1 and last_fence > start_idx:\n\
          \                return s[start_idx:last_fence].strip()\n        first_brace\
          \ = s.find('{')\n        first_bracket = s.find('[')\n        if first_brace\
          \ == -1 and first_bracket == -1:\n            return s\n        if first_brace\
          \ != -1 and (first_bracket == -1 or first_brace < first_bracket):\n    \
          \        last_brace = s.rfind('}')\n            if last_brace != -1:\n \
          \               return s[first_brace:last_brace + 1]\n        else:\n  \
          \          last_bracket = s.rfind(']')\n            if last_bracket != -1:\n\
          \                return s[first_bracket:last_bracket + 1]\n        return\
          \ s\n\n    t_clean = extract_json_str(t)\n    if not t_clean:\n        return\
          \ fail(\"PARSE\", \"LLM 输出为空（请确认当前分支 LLM 已执行且三路汇入本节点）\")\n\n    try:\n \
          \       payload = json.loads(t_clean)\n    except Exception as e:\n    \
          \    return fail(\"PARSE\", \"LLM 输出非合法 JSON: \" + str(e))\n\n    if not\
          \ isinstance(payload, dict):\n        return fail(\"PARSE\", \"根节点必须是 JSON\
          \ 对象\")\n\n    # ===== 新增：完整性校验 =====\n    required = _REQUIRED_KEYS.get(dt,\
          \ [])\n    missing = [k for k in required if k not in payload]\n    if missing:\n\
          \        return fail(\"VALIDATE\",\n            f\"LLM 返回 JSON 缺少 {len(missing)}\
          \ 个必须字段: {', '.join(missing)}。\"\n            f\"请检查当前分支 LLM 节点 Prompt 是否包含这些键。\"\
          )\n\n    out = {\"ok\": True, \"type\": dt, \"payload\": payload}\n    return\
          \ {\"result_json\": json.dumps(out, ensure_ascii=False)}"
        code_language: python3
        desc: 三路 LLM 汇入；按「dict_type→route」的 route 择一路 text（与 IF 同源）。未执行支路 text 视为空。
