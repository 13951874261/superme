          \ for i in x).strip()\n    return str(x).strip()\n\n\ndef main(word, user_context,\
          \ locale, direction):\n    pw = _s(word)\n    pc = _s(user_context)\n  \
          \  pl = _s(locale)\n    pd = _s(direction)\n    user_block_zh = (\n    \
          \    \"【目标词条】\" + pw + \"\\n\"\n        \"请仅为上述【目标词条】撰写现代汉语词典 JSON；释义、例句、辨析必须全部围绕该词，不得写其它词。\\\
