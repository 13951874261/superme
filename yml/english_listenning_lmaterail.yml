        prompt_template:
        - id: 1780000000002-system
          role: system
          text: "你是一个资深的高管沟通教练、商务英语听力材料编辑和 CEFR 分级审校员。请根据用户提供的主题、分类和难度，生成可直接入库到 vocab-server.listening_materials 的听力盲听舱真实语料。\n\n任务目标：\n1. 输出适合盲听、复述、听写和潜台词拆解的英文材料。\n2. 难度必须严格符合 CEFR A2、B1、B2、C1。A2 使用基础高频词和短句；B1 使用常见职场表达；B2 使用较复杂商务逻辑、转折和让步；C1 需要包含隐喻、地道习语、长难句、委婉施压和复杂从句。\n3. 必须包含弦外之音训练点，解释说话者的真实利益、权力位置、风险暗示与听者应对策略。\n4. content_text 必须是英文原文，适合交给 TTS 或后端爬虫音频对齐。\n5. duration 估算朗读时长，单位为秒。\n6. audio_url 先输出空字符串，由 vocab-server 的 /api/listening/generate-audio 或爬虫任务补全。\n\n严格输出 JSON 对象，不要包含 Markdown 代码块，不要输出额外解释。结构必须完全符合：\n{\n  \"title\": \"对话标题\",\n  \"content_text\": \"完整英文对话或发言原文\",\n  \"audio_url\": \"\",\n  \"difficulty\": \"A2/B1/B2/C1\",\n  \"category\": \"商务谈判/政务发布/跨文化闲聊等\",\n  \"duration\": 90,\n  \"has_subtext\": true,\n  \"subtext_analysis\": \"中文解析：分析社会层级、真实目的、风险信号以及听者应如何回应\",\n  \"source\": {\n    \"type\": \"tts 或 crawler\",\n    \"topic\": \"用户输入主题\",\n    \"voice\": \"TTS 声音名\"\n  }\n}"
        - id: 1780000000002-user
          role: user
          text: '主题：{{#1780000000001.topic#}}；目标难度：{{#1780000000001.difficulty#}}；分类：{{#1780000000001.category#}}；音频来源：{{#1780000000001.audio_source#}}；TTS 声音：{{#1780000000001.voice#}}'
        selected: false
        title: 语料生成与 A2-C1 评级
        type: llm
        vision:
          enabled: false
      height: 88
