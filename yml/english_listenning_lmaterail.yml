    - data:
        code: "import json\n\ndef main(llm_text: str, topic: str, difficulty: str, category: str, audio_source: str, voice: str) -> dict:\n    raw = (llm_text or '').strip()\n    raw = raw.removeprefix('```json').removeprefix('```').removesuffix('```').strip()\n    allowed = {'A2', 'B1', 'B2', 'C1'}\n\n    try:\n        material = json.loads(raw)\n        if not isinstance(material, dict):\n            raise ValueError('LLM output is not a JSON object')\n\n        material['difficulty'] = material.get('difficulty') if material.get('difficulty') in allowed else difficulty\n        material['category'] = material.get('category') or category\n        material['audio_url'] = material.get('audio_url') or ''\n        material['has_subtext'] = bool(material.get('has_subtext', True))\n        material['duration'] = int(material.get('duration') or max(30, round(len(material.get('content_text', '').split()) / 2.4)))\n        material['source'] = material.get('source') or {}\n        material['source']['type'] = material['source'].get('type') or audio_source\n        material['source']['topic'] = material['source'].get('topic') or topic\n        material['source']['voice'] = material['source'].get('voice') or (voice or 'alloy')\n\n        db_payload = {\n            'title': material.get('title', '').strip(),\n            'content_text': material.get('content_text', '').strip(),\n            'audio_url': material.get('audio_url', ''),\n            'difficulty': material['difficulty'],\n            'category': material['category'],\n            'duration': material['duration'],\n            'has_subtext': material['has_subtext'],\n            'subtext_analysis': material.get('subtext_analysis', '').strip(),\n            'source': material['source']\n        }\n\n        markdown_lines = [\n            f\"# 听力盲听舱语料 - {db_payload['title']}\",\n            '',\n            f\"- 难度: {db_payload['difficulty']}\",\n            f\"- 分类: {db_payload['category']}\",\n            f\"- 预计时长: {db_payload['duration']} 秒\",\n            f\"- 音频来源: {db_payload['source'].get('type', audio_source)}\",\n            '',\n            '## 英文原文',\n            db_payload['content_text'],\n            '',\n            '## 弦外之音与博弈分析',\n            db_payload['subtext_analysis']\n        ]\n\n        return {\n            'material_json': json.dumps(db_payload, ensure_ascii=False),\n            'markdown_text': '\\n'.join(markdown_lines),\n            'tts_payload': json.dumps({\n                'text': db_payload['content_text'],\n                'voice': db_payload['source'].get('voice', 'alloy'),\n                'difficulty': db_payload['difficulty'],\n                'category': db_payload['category'],\n                'title': db_payload['title']\n            }, ensure_ascii=False)\n        }\n    except Exception as e:\n        fallback = {\n            'title': f'{topic} Listening Material',\n            'content_text': '',\n            'audio_url': '',\n            'difficulty': difficulty if difficulty in allowed else 'B2',\n            'category': category,\n            'duration': 0,\n            'has_subtext': True,\n            'subtext_analysis': f'JSON 解析失败：{str(e)}',\n            'source': {'type': audio_source, 'topic': topic, 'voice': voice or 'alloy'}\n        }\n        return {\n            'material_json': json.dumps(fallback, ensure_ascii=False),\n            'markdown_text': '> ⚠️ JSON 解析失败，LLM 输出可能格式异常。',\n            'tts_payload': json.dumps({'text': '', 'voice': voice or 'alloy'}, ensure_ascii=False)\n        }"
        code_language: python3
