    - data:
        code: |
          import json

          def main(json1: str, json2: str, json3: str) -> dict:
              merged_list = []

              def parse_chunk(json_str: str) -> list:
                  if not json_str:
                      return []
                  clean = json_str.strip()
                  for marker in ['```json', '```']:
                      clean = clean.strip(marker).strip()
                  try:
                      parsed = json.loads(clean)
                      return parsed if isinstance(parsed, list) else []
                  except:
                      return []

              merged_list.extend(parse_chunk(json1))
              merged_list.extend(parse_chunk(json2))
              merged_list.extend(parse_chunk(json3))

              json_output = json.dumps(merged_list, ensure_ascii=False)

              md_lines = []
              for item in merged_list:
                  word = item.get("word", "")
                  payload = item.get("payload", {})
                  phonetic = payload.get("phonetic", "")
                  pos = payload.get("partOfSpeech", "")
                  meaning = payload.get("meaning", "")
                  def_en = payload.get("definition_en", "")
                  note = payload.get("business_note", "")
                  examples = payload.get("examples", [])

                  md_lines.append(f"### {word} [{phonetic}]")
                  md_lines.append(f"* **词性**: {pos}")
                  md_lines.append(f"* **中/英释义**: {meaning} / {def_en}")
                  md_lines.append(f"* **高管实战笔记**: {note}")
                  md_lines.append(f"* **博弈例句**:")
                  for ex in examples:
                      md_lines.append(f"  - {ex}")
                  md_lines.append("\n---")

              markdown_text = "\n".join(md_lines)

              return {
                  "clean_json": json_output,
                  "markdown_text": markdown_text
              }
        code_language: python3
        outputs:
          clean_json:
            children: null
            type: string
          markdown_text:
            children: null
            type: string
