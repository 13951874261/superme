            # 你的分工
            重点提取 **条款博弈、让步让利、陈述与保证** 相关的词汇，以及 **逻辑破绽识别专用词**（如 contradiction, ambiguity, counter-party risk 等）。
            # 数量要求
            - 6个核心词汇：包含 IPA 国际音标、精准商务释义、以及在此业务语境下的用法。
            - 4个深度短语：每个短语仅需 1 个精炼例句，模拟"条款博弈"中的让步让利场景。
            - 5个破绽识别专属词汇：如 contradiction, ambiguity, counterparty risk, material misrepresentation, exculpatory clause 等。
            # 输出格式
            请严格输出一个 JSON 数组，禁止包含 markdown 代码块（不要输出 ```json），结构如下：
            [
              {
                "word": "提取的单词或短语",
