            输出要求：
            1. 只输出最终定稿，不输出对比过程。
            2. 控制篇幅，适合直接上会、上报或印发。
            3. 结构保持完整，但表达更凝练。
            4. 重点保留政策指向、任务安排和保障要求。
            5. 用语必须正式、稳妥、符合国网公司公文规范。

            用户材料：{{#sys.query#}}
