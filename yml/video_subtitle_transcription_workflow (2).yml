    - data:
        code: "import json\nimport re\n\ndef main(llm_output: str) -> dict:\n    result\
          \ = {\n        \"transcript_text\": \"\",\n        \"srt_text\": \"\"\n\
          \    }\n    try:\n        clean_text = llm_output.strip()\n        if clean_text.startswith(\"\
          ```json\"):\n            clean_text = clean_text[7:]\n        if clean_text.endswith(\"\
          ```\"):\n            clean_text = clean_text[:-3]\n        clean_text =\
          \ clean_text.strip()\n        \n        parsed = json.loads(clean_text)\n\
          \        result[\"transcript_text\"] = parsed.get(\"transcript_text\", \"\
          \")\n        result[\"srt_text\"] = parsed.get(\"srt_text\", \"\")\n   \
          \ except Exception as e:\n        result[\"transcript_text\"] = f\"解析失败，原始输出:\\\
          n{llm_output}\"\n        srt_match = re.search(r'(\"srt_text\"\\s*:\\s*\"\
          (.*?)\")|(\\d+\\n\\d{2}:\\d{2}:\\d{2})', llm_output, re.DOTALL)\n      \
          \  if srt_match:\n            result[\"srt_text\"] = \"已从异常输出中粗暴提取，请人工核对。\"\
          \n        else:\n            result[\"srt_text\"] = \"无法提取字幕时间轴。\"\n   \
          \ return result\n"
        code_language: python3
        desc: 解析 LLM 吐出的 JSON 内容，分别提取纯文本与 SRT 字幕
        outputs:
          srt_text:
            children: null
            type: string
          transcript_text:
            children: null
            type: string
        selected: false
        title: 解析 JSON
        type: code
        variables:
